<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Student Registration for Coding Event</h1>
    <form id="registrationForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" required><br><br>
        
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" required><br><br>
        
        <label for="age">Age:</label>
        <input type="number" id="age" min="16" max="100" required><br><br>
        
        <label for="gender">Gender:</label>
        <select id="gender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select><br><br>
        
        <label for="college">College Name:</label>
        <input type="text" id="college" required><br><br>
        
        <label for="year">Year of Study:</label>
        <select id="year" required>
            <option value="">Select</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
        </select><br><br>
        
        <label for="course">Course/Program:</label>
        <input type="text" id="course" required><br><br>
        
        <label for="address">Address:</label>
        <textarea id="address" rows="3" required></textarea><br><br>
        
        <button type="submit">Register</button>
    </form>
    
    <button id="exportBtn">Export to Excel</button>
    
    <h2>Registered Students</h2>
    <div id="studentsContainer"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="raj.js"></script>
</body>
</html>
